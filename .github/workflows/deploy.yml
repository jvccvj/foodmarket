name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Run every Monday at 00:00 UTC
    schedule:
      - cron: '0 0 * * 1'
    workflow_dispatch:

    steps:
      - uses: actions/checkout@v5

      - name: Generate fresh food prices
        run: |
          python3 << 'EOF'
          import random
          import datetime

          months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
          today = datetime.date.today()
          current_month = months[today.month - 1]

          # Base prices (realistic USD/kg)
          bases = {'Apples': 3.5, 'Tomatoes': 2.8, 'Milk': 4.2}
          variance = 0.2

          # Generate 6 months of data ending at current month
          month_idx = today.month - 1
          data = []
          for i in range(6):
            m = (month_idx - 5 + i) % 12
            month = months[m]
            row = [month]
            for item in ['Apples', 'Tomatoes', 'Milk']:
              price = round(bases[item] + random.uniform(-variance, variance), 2)
              row.append(str(price))
            data.append(','.join(row))

          csv_content = 'Month,Apples,Tomatoes,Milk\n' + '\n'.join(data)

          # Read index.html and replace CSV variable
          with open('index.html', 'r') as f:
            content = f.read()

          start = content.find('const CSV = `')
          end = content.find('`;', start) + 2
          new_content = content[:start] + f'const CSV = `{csv_content}`;' + content[end:]

          with open('index.html', 'w') as f:
            f.write(new_content)

          print(f'Updated CSV data for current month: {current_month}')
          print('Sample row:', data[-1])
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "Auto-refresh: fresh food prices $(date +'%Y-%m-%d')"
          git push