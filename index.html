<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Plot Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        canvas { max-width: 100%; }
        #error { color: red; margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>CSV Data Visualization</h1>
    <canvas id="csvChart"></canvas>
    <pre id="error"></pre>
    <script>
        const CSV = `Month,Sales,Expenses
Jan,1200,800
Feb,1500,950
Mar,1800,1100
Apr,2200,1300
May,1900,1200
Jun,2400,1400`;

        const lines = CSV.trim().split('\n');
        const headers = lines[0].split(',');
        const rows = lines.slice(1).map(line => line.split(',').map(v => v.trim()));

        const labels = rows.map(row => row[0]);
        const datasets = headers.slice(1).map((header, i) => ({
            label: header,
            data: rows.map(row => parseFloat(row[i + 1])),
            borderWidth: 2
        }));

        new Chart(document.getElementById('csvChart'), {
            type: 'line',
            data: { labels, datasets },
            options: { responsive: true }
        });
    </script>
</body>
</html>
