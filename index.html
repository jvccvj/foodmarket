<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Plot Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        #chart-container {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <h1>CSV Data Visualization</h1>
    <div id="chart-container">
        <canvas id="csvChart"></canvas>
    </div>
    <script>
        async function loadCSV(path) {
            const response = await fetch(path);
            const text = await response.text();
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1).map(line => line.split(','));

            const labels = rows.map(row => row[0]);
            const datasets = headers.slice(1).map((header, i) => ({
                label: header,
                data: rows.map(row => parseFloat(row[i + 1])),
                borderWidth: 2
            }));

            new Chart(document.getElementById('csvChart'), {
                type: 'line',
                data: { labels, datasets },
                options: { responsive: true }
            });
        }

        loadCSV('data.csv');
    </script>
</body>
</html>
